name: render contribution art

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["scripts/generate.mjs"]

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/generate.mjs
      - name: commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898994+github-actions[bot]@users.noreply.github.com"
          git add assets
          git diff --cached --quiet || (git commit -m "render contribution art" && git push)
