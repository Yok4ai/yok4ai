<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 124" width="880" height="124" role="img" aria-label="Imroz Eshan — generative ai, computer vision">
<defs>
  <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#ff2d6f" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#ff2d6f" stop-opacity="0.9"/>
    <stop offset="1" stop-color="#ff2d6f" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="sweepgrad" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#ff5c8a" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#ff5c8a" stop-opacity="0.9"/>
    <stop offset="1" stop-color="#ff5c8a" stop-opacity="0"/>
  </linearGradient>
  <filter id="hglow" x="-40%" y="-400%" width="180%" height="900%"><feGaussianBlur stdDeviation="2.6"/></filter>
  <clipPath id="rulespan"><rect x="200" y="68" width="480" height="10"/></clipPath>
</defs>
<style>
  .sweep { animation: sweep 6.5s cubic-bezier(.4,0,.6,1) infinite; }
  @keyframes sweep { 0% { transform: translateX(0) } 100% { transform: translateX(640px) } }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important } }
</style>
<text x="445" y="50" text-anchor="middle" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="34" font-weight="700" letter-spacing="10" fill="#334155">IMROZ ESHAN</text>
<rect x="200" y="72.2" width="480" height="1.8" fill="url(#rule)" filter="url(#hglow)"/>
<rect x="200" y="72.4" width="480" height="1.2" fill="url(#rule)"/>
<g clip-path="url(#rulespan)"><rect class="sweep" x="120" y="72" width="80" height="2" fill="url(#sweepgrad)"/></g>
<rect x="437" y="70" width="6" height="6" transform="rotate(45 440 73)" fill="#ff2d6f"/>
<text x="430" y="104" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11.5" letter-spacing="4" fill="#64748b">GENERATIVE AI</text>
<circle cx="440" cy="100" r="2" fill="#ff2d6f"/>
<text x="454" y="104" text-anchor="start" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="11.5" letter-spacing="4" fill="#64748b">COMPUTER VISION</text>
</svg>